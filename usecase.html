<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Use Case — ChoosingYourAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(160deg,#f8f9fb 0%,#f3f0f8 40%,#eef0fa 100%);color:#1a1a2e;min-height:100vh}
header{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(99,102,241,.08);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;text-decoration:none}
.back{padding:8px 18px;border-radius:20px;border:1px solid #e2e0ec;background:#fff;font-size:13px;font-weight:500;color:#555;text-decoration:none;transition:all .2s}
.back:hover{border-color:#a78bfa;color:#6366f1;background:#f8f5ff}
.container{max-width:900px;margin:0 auto;padding:32px 24px}

/* Hero */
.hero{text-align:center;margin-bottom:36px}
.hero-icon{font-size:48px;margin-bottom:12px}
.hero h1{font-size:32px;font-weight:800;margin-bottom:10px}
.hero p{font-size:16px;color:#666;line-height:1.6;max-width:600px;margin:0 auto}

/* Disclaimer */
.disclaimer{background:#fef3c7;border:1px solid #f59e0b;border-radius:12px;padding:16px 20px;margin-bottom:28px;font-size:13px;color:#92400e;line-height:1.5}

/* Prompts */
.prompts-section{margin-bottom:36px}
.prompts-section h2{font-size:20px;font-weight:700;margin-bottom:16px}
.prompt-card{background:#fff;border:1px solid rgba(99,102,241,.08);border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 8px rgba(99,102,241,.04);transition:all .2s}
.prompt-card:hover{box-shadow:0 4px 16px rgba(99,102,241,.1)}
.prompt-text{font-size:14px;color:#333;line-height:1.6;margin-bottom:10px;font-style:italic}
.prompt-footer{display:flex;align-items:center;justify-content:space-between}
.prompt-tool{font-size:12px;font-weight:600;color:#6366f1;background:#f3f0ff;padding:4px 12px;border-radius:12px}
.copy-btn{padding:5px 14px;border-radius:12px;border:1px solid #e2e0ec;background:#fff;font-size:12px;cursor:pointer;color:#555;transition:all .2s}
.copy-btn:hover{border-color:#6366f1;color:#6366f1;background:#f8f5ff}
.copy-btn.copied{border-color:#10b981;color:#10b981;background:#ecfdf5}

/* Tools */
.tools-section h2{font-size:20px;font-weight:700;margin-bottom:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
.card{background:#fff;border:1px solid rgba(99,102,241,.08);border-radius:14px;padding:20px;display:flex;flex-direction:column;transition:all .25s;box-shadow:0 2px 10px rgba(99,102,241,.05);cursor:pointer;text-decoration:none;color:inherit}
.card:hover{box-shadow:0 6px 24px rgba(99,102,241,.12);transform:translateY(-2px)}
.card-top{display:flex;gap:14px;align-items:flex-start;margin-bottom:12px}
.card-icon{width:48px;height:48px;border-radius:12px;border:1px solid #e8e5ef;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#f8f7fc;overflow:hidden}
.card-icon img{width:34px;height:34px;object-fit:contain}
.card-title{font-size:16px;font-weight:700;margin-bottom:4px}
.rating-row{font-size:12px;color:#777}
.rating-row .star{color:#f59e0b}
.rating-row .score{font-weight:700;color:#1a1a2e}
.desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:12px;flex:1}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:500;background:#f3f0ff;color:#6366f1}

footer{background:#fff;border-top:1px solid rgba(99,102,241,.08);padding:24px 32px;text-align:center;margin-top:40px}
footer a{color:#6366f1;text-decoration:none;font-size:13px;font-weight:500;margin:0 12px}
footer .copy{font-size:12px;color:#999;margin-top:10px}
</style>
</head>
<body>
<header>
  <a href="index.html" class="logo">ChoosingYourAI</a>
  <a href="index.html" class="back">← Back to All Tools</a>
</header>

<div class="container">
  <div class="hero" id="hero"></div>
  <div id="disclaimer"></div>
  <div class="prompts-section" id="promptsSection">
    <h2>💡 Popular Prompts to Try</h2>
    <div id="prompts"></div>
  </div>
  <div class="tools-section">
    <h2>🛠️ Recommended Tools</h2>
    <div class="grid" id="grid"></div>
  </div>
</div>

<footer>
  <a href="index.html">Home</a>
  <a href="#">About</a>
  <a href="#">Privacy Policy</a>
  <a href="#">Contact</a>
  <p class="copy">© 2026 ChoosingYourAI. All rights reserved.</p>
</footer>

<script src="tools.js"></script>
<script src="domains.js"></script>
<script src="usecases.js"></script>
<script>
const id = new URLSearchParams(location.search).get('c');
const uc = usecases.find(u => u.id === id);

if (!uc) {
  document.getElementById('hero').innerHTML = '<h1>Use case not found</h1><p>Go back and browse all tools.</p>';
} else {
  document.title = uc.title + ' — ChoosingYourAI';
  document.getElementById('hero').innerHTML = `
    <div class="hero-icon">${uc.icon}</div>
    <h1>${uc.title}</h1>
    <p>${uc.desc}</p>`;

  if (uc.disclaimer) {
    document.getElementById('disclaimer').innerHTML = `<div class="disclaimer">${uc.disclaimer}</div>`;
  }

  // Prompts
  document.getElementById('prompts').innerHTML = uc.prompts.map((p,i) => `
    <div class="prompt-card">
      <p class="prompt-text">"${p.text}"</p>
      <div class="prompt-footer">
        <span class="prompt-tool">Best with: ${p.tool}</span>
        <button class="copy-btn" onclick="copyPrompt(this,'${i}')">📋 Copy prompt</button>
      </div>
    </div>`).join('');

  // Filtered tools
  const filtered = tools.filter(t => t.tags.some(tag => uc.tags.includes(tag)));
  document.getElementById('grid').innerHTML = filtered.map(t => {
    const domain = (typeof toolDomains!=='undefined' && toolDomains[t.name]) || '';
    const logoHTML = domain
      ? `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" alt="${t.name}">`
      : '🤖';
    return `
    <a href="tool.html?t=${encodeURIComponent(t.name)}" class="card">
      <div class="card-top">
        <div class="card-icon">${logoHTML}</div>
        <div>
          <div class="card-title">${t.name}</div>
          <div class="rating-row"><span class="star">★</span> <span class="score">${t.rating}</span> · ${t.price||'Freemium'}</div>
        </div>
      </div>
      <p class="desc">${t.desc}</p>
      <div class="tags">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
    </a>`;
  }).join('');
}

function copyPrompt(btn, idx) {
  navigator.clipboard.writeText(uc.prompts[idx].text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy prompt'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>

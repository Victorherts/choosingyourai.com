<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Details — ChoosingYourAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(160deg,#f8f9fb 0%,#f3f0f8 40%,#eef0fa 100%);color:#1a1a2e;min-height:100vh}
header{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(99,102,241,.08);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:26px;font-weight:800;background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;text-decoration:none}
.back{padding:8px 18px;border-radius:20px;border:1px solid #e2e0ec;background:#fff;font-size:13px;font-weight:500;color:#555;cursor:pointer;text-decoration:none;transition:all .2s}
.back:hover{border-color:#a78bfa;color:#6366f1;background:#f8f5ff}

.container{max-width:800px;margin:0 auto;padding:32px 24px}

/* Hero */
.hero{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.08);margin-bottom:24px}
.hero h1{font-size:28px;font-weight:800;margin-bottom:8px}
.meta{display:flex;align-items:center;gap:10px;font-size:14px;color:#777;margin-bottom:16px;flex-wrap:wrap}
.stars{color:#f59e0b;letter-spacing:1px}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tag{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;background:#f3f0ff;color:#6366f1}
.desc{font-size:15px;color:#555;line-height:1.7;margin-bottom:24px}
.try-btn{display:inline-block;padding:12px 28px;border-radius:24px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:14px;font-weight:600;text-decoration:none;box-shadow:0 2px 8px rgba(99,102,241,.25);transition:all .2s}
.try-btn:hover{box-shadow:0 4px 14px rgba(99,102,241,.35);transform:translateY(-1px)}

/* Reviews */
.reviews-section{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.08)}
.reviews-section h2{font-size:20px;font-weight:700;margin-bottom:20px}

/* Login prompt */
.login-prompt{background:#f8f5ff;border:1px solid #e2e0ec;border-radius:12px;padding:20px;text-align:center;margin-bottom:24px}
.login-prompt p{color:#666;margin-bottom:12px;font-size:14px}
.login-btn{padding:10px 24px;border-radius:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.login-btn:hover{box-shadow:0 4px 14px rgba(99,102,241,.35)}
.login-input{display:none;margin-bottom:20px}
.login-input.show{display:block}
.login-input input{width:100%;padding:10px 16px;border:1px solid #e2e0ec;border-radius:10px;font-size:14px;margin-bottom:8px;outline:none}
.login-input input:focus{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.15)}

/* Review form */
.review-form{display:none;margin-bottom:24px}
.review-form.show{display:block}
.review-form textarea{width:100%;padding:12px 16px;border:1px solid #e2e0ec;border-radius:12px;font-size:14px;font-family:inherit;resize:vertical;min-height:80px;outline:none;margin-bottom:12px}
.review-form textarea:focus{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.15)}
.star-select{display:flex;gap:4px;margin-bottom:12px;font-size:24px;cursor:pointer}
.star-select span{color:#d4d0e0;transition:color .15s}
.star-select span.active{color:#f59e0b}
.star-select:hover span{color:#f59e0b}
.star-select span:hover ~ span{color:#d4d0e0 !important}
.submit-btn{padding:10px 24px;border-radius:20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}
.logged-as{font-size:13px;color:#666;margin-bottom:12px}
.logged-as strong{color:#6366f1}
.logout-link{color:#ec4899;cursor:pointer;font-size:12px;margin-left:8px}

/* Review list */
.review-list{display:flex;flex-direction:column;gap:16px}
.review-item{border:1px solid #f0edf6;border-radius:12px;padding:16px}
.review-item .r-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-item .r-user{font-weight:600;font-size:14px}
.review-item .r-date{font-size:12px;color:#999}
.review-item .r-stars{color:#f59e0b;font-size:14px;margin-bottom:6px}
.review-item .r-text{font-size:13.5px;color:#555;line-height:1.6}
.no-reviews{color:#999;font-size:14px;text-align:center;padding:20px}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">ChoosingYourAI</a>
  <a href="index.html" class="back">← Back to Tools</a>
</header>

<div class="container">
  <div class="hero" id="hero"></div>

  <div class="reviews-section">
    <h2>Reviews & Comments</h2>

    <div class="login-prompt" id="loginPrompt">
      <p>Log in to leave a review</p>
      <button class="login-btn" id="showLoginBtn">Sign In</button>
      <div class="login-input" id="loginInput">
        <input type="text" id="usernameInput" placeholder="Enter your display name">
        <button class="login-btn" id="loginBtn">Continue</button>
      </div>
    </div>

    <div class="review-form" id="reviewForm">
      <p class="logged-as">Signed in as <strong id="userName"></strong><span class="logout-link" id="logoutBtn">Sign out</span></p>
      <div class="star-select" id="starSelect">
        <span data-v="1">☆</span><span data-v="2">☆</span><span data-v="3">☆</span><span data-v="4">☆</span><span data-v="5">☆</span>
      </div>
      <textarea id="commentInput" placeholder="Write your review..."></textarea>
      <button class="submit-btn" id="submitBtn">Post Review</button>
    </div>

    <div class="review-list" id="reviewList"></div>
  </div>
</div>

<script src="tools.js"></script>
<script>
const toolName = new URLSearchParams(location.search).get('t');
const tool = tools.find(t => t.name === toolName);

if (!tool) { document.getElementById('hero').innerHTML = '<h1>Tool not found</h1><p>Go back and try again.</p>'; }
else {
  document.title = tool.name + ' — ChoosingYourAI';
  const s = r => { let o=''; for(let i=1;i<=5;i++) o+=i<=Math.floor(r)?'★':(i-.5<=r?'★':'☆'); return o; };
  document.getElementById('hero').innerHTML = `
    <h1>${tool.name}</h1>
    <div class="meta">
      <span class="stars">${s(tool.rating)}</span>
      <span>${tool.rating} / 5</span>
      <span>(${tool.reviews.toLocaleString()} reviews)</span>
      <span>👁 ${tool.views} views</span>
    </div>
    <div class="tags">${tool.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <p class="desc">${tool.desc}</p>
    <a href="https://www.google.com/search?q=${encodeURIComponent(tool.name+' AI tool')}" target="_blank" rel="noopener" class="try-btn">Try ${tool.name} ↗</a>`;
}

// Auth
const STORAGE_USER = 'cyai_user';
let currentUser = localStorage.getItem(STORAGE_USER);

function getReviews() { return JSON.parse(localStorage.getItem('cyai_reviews_'+toolName) || '[]'); }
function saveReviews(r) { localStorage.setItem('cyai_reviews_'+toolName, JSON.stringify(r)); }

function updateAuthUI() {
  currentUser = localStorage.getItem(STORAGE_USER);
  document.getElementById('loginPrompt').style.display = currentUser ? 'none' : 'block';
  document.getElementById('reviewForm').classList.toggle('show', !!currentUser);
  if (currentUser) document.getElementById('userName').textContent = currentUser;
}

document.getElementById('showLoginBtn').addEventListener('click', () => {
  document.getElementById('loginInput').classList.add('show');
  document.getElementById('usernameInput').focus();
});

document.getElementById('loginBtn').addEventListener('click', () => {
  const name = document.getElementById('usernameInput').value.trim();
  if (!name) return;
  localStorage.setItem(STORAGE_USER, name);
  updateAuthUI();
});

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_USER);
  updateAuthUI();
});

// Star rating
let selectedRating = 0;
document.getElementById('starSelect').querySelectorAll('span').forEach(star => {
  star.addEventListener('click', () => {
    selectedRating = +star.dataset.v;
    document.getElementById('starSelect').querySelectorAll('span').forEach((s,i) => {
      s.textContent = i < selectedRating ? '★' : '☆';
      s.classList.toggle('active', i < selectedRating);
    });
  });
});

// Submit
document.getElementById('submitBtn').addEventListener('click', () => {
  const text = document.getElementById('commentInput').value.trim();
  if (!selectedRating || !text) return alert('Please add a rating and comment.');
  const reviews = getReviews();
  reviews.unshift({ user: currentUser, rating: selectedRating, text, date: new Date().toLocaleDateString() });
  saveReviews(reviews);
  document.getElementById('commentInput').value = '';
  selectedRating = 0;
  document.getElementById('starSelect').querySelectorAll('span').forEach(s => { s.textContent='☆'; s.classList.remove('active'); });
  renderReviews();
});

function renderReviews() {
  const reviews = getReviews();
  const list = document.getElementById('reviewList');
  if (!reviews.length) { list.innerHTML = '<p class="no-reviews">No reviews yet. Be the first!</p>'; return; }
  const s = r => { let o=''; for(let i=1;i<=5;i++) o+=i<=r?'★':'☆'; return o; };
  list.innerHTML = reviews.map(r => `
    <div class="review-item">
      <div class="r-header"><span class="r-user">${r.user}</span><span class="r-date">${r.date}</span></div>
      <div class="r-stars">${s(r.rating)}</div>
      <p class="r-text">${r.text}</p>
    </div>`).join('');
}

updateAuthUI();
renderReviews();
</script>
</body>
</html>
